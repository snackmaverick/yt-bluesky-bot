name: YouTube to Bluesky

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:          # lets you run it by hand from the Actions tab

permissions:
  contents: write             # needed to commit seen.json back

jobs:
  repost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Check for new videos and post
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
          POST_TEMPLATE: "{title}"
          MAX_BACKFILL: "3"
        run: python bot.py

      - name: Save state
        run: |
          if [[ -n "$(git status --porcelain seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen.json
            git commit -m "Update seen videos [skip ci]"
            git push
          fi
